version: 1

# Single-user tool — full access, no role-based permissions
roles:
  - id: user
    name: User
    level: full
    capabilities:
      - ingest documents via CLI
      - query knowledge base via CLI
      - query knowledge base via MCP tool
      - list ingested documents
      - delete documents from knowledge base

resource_access: []  # No resource-scoped permissions needed
