version: 1

constraints:
  technical:
    - id: tech-001
      rule: "All document ingestion goes through src/kb_qa/ingest.py — no direct ChromaDB writes from other modules"
      scope: "backend"
      verify: "grep_absent: chroma_client or collection.add in files outside ingest.py"

    - id: tech-002
      rule: "All query logic goes through src/kb_qa/query.py — MCP server must not access ChromaDB directly"
      scope: "backend"
      verify: "grep_absent: collection.query in agents/mcp_server.py"

    - id: tech-003
      rule: "No secrets or API keys in source code — all credentials from environment variables"
      scope: "all"
      verify: "grep_absent: hardcoded API keys or tokens in src/ and agents/"

  quality:
    - id: qual-001
      rule: "Each source module must have a corresponding test file in tests/"
      scope: "backend"
      verify: "file_exists: tests/test_{module}.py for each src/kb_qa/{module}.py"

    - id: qual-002
      rule: "knowledge/vectorstore/ must not be committed to git"
      scope: "all"
      verify: "gitignore_contains: knowledge/vectorstore"

  security:
    - id: sec-001
      rule: "No secrets in source code"
      scope: "all"
      verify: "grep_absent: hardcoded API keys, passwords, tokens in source files"

    - id: sec-002
      rule: ".env files must be listed in .gitignore"
      scope: "all"
      verify: "gitignore_contains: .env"
