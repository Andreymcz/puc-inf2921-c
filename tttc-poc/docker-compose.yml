services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  pyserver:
    build:
      context: ./tttc-light-js-ollama
      dockerfile: pyserver/Dockerfile
    env_file: .env.poc
    ports:
      - "8000:8000"
    # Override hardcoded port 8080 in Dockerfile CMD; express-server expects :8000
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - ollama

  express-server:
    build:
      context: .
      dockerfile: Dockerfile.express-poc
    env_file: .env.poc
    ports:
      - "8080:8080"
    depends_on:
      - pyserver
      - redis

  next-client:
    build:
      context: .
      dockerfile: Dockerfile.nextclient-poc
    env_file: .env.poc
    environment:
      # PORT=8000 no env_file é para o pyserver; sobrescreve aqui para o Next.js
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - express-server

volumes:
  ollama-models:
